<div style="margin-bottom: 20px; text-align: center;">
    <label for="csvSelector" style="font-weight: bold;">選擇資料來源：</label>
    <select id="csvSelector" style="padding: 5px 10px; border-radius: 4px; border: 1px solid #ccc;">
        <option value="multihop_qa_kg2_20260308_163710_result.csv">預設檔案 (163710)</option>
        <option value="another_result_file.csv">另一個結果檔案.csv</option>
        <option value="test_data.csv">測試資料.csv</option>
    </select>
</div>

<div class="container">
    <table id="resultTable" class="display nowrap" style="width:100%">
        <thead><tr id="headerRow"></tr></thead>
        <tbody id="tableBody"></tbody>
        <tfoot id="footerRow"></tfoot>
    </table>
</div>

<script>
    // 指定優先顯示的順序
    const priorityCols = [
        'question', 'answer', 'context_1hop', 'context_2hop', 
        'geval_Relevance_multi', 'geval_Agnosticism_multi', 
        'geval_Completeness_multi', 'geval_Accuracy_multi', 
        'geval_Reasonableness_multi', 'geval_情境連貫性', 'geval_跨文件必要性'
    ];

    $(document).ready(function() {
        // 初始載入
        loadCsvData($('#csvSelector').val());

        // 當選單改變時觸發
        $('#csvSelector').on('change', function() {
            const selectedFile = $(this).val();
            loadCsvData(selectedFile);
        });
    });

    function loadCsvData(fileName) {
        // 如果表格已經存在，先銷毀它並清空 HTML 內容，以便重新繪製表頭
        if ($.fn.DataTable.isDataTable('#resultTable')) {
            $('#resultTable').DataTable().destroy();
            $('#headerRow').empty();
            $('#tableBody').empty();
            $('#footerRow').empty();
        }

        Papa.parse(fileName, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                renderTable(results);
            },
            error: function(err) {
                alert("讀取檔案失敗: " + fileName);
            }
        });
    }

    function renderTable(results) {
        const allCols = results.meta.fields;
        
        const sortedCols = [
            ...priorityCols.filter(c => allCols.includes(c)),
            ...allCols.filter(c => !priorityCols.includes(c))
        ];

        const hRow = $('#headerRow');
        sortedCols.forEach(col => {
            hRow.append(`<th>${col}</th>`);
        });

        $('#resultTable').DataTable({
            data: results.data,
            columns: sortedCols.map(col => ({
                data: col,
                render: function(val, type, row) {
                    if (!val) return "";
                    if (['question', 'answer'].includes(col)) {
                        return `<div class="full-text">${val}</div>`;
                    }
                    if (col.includes('context')) {
                        return `
                            <div class="content-cell">
                                <div class="expandable">${val}</div>
                                <span class="toggle-btn" onclick="toggleText(this)">[展開全文]</span>
                            </div>`;
                    }
                    if (col.startsWith('geval_')) {
                        return `<span class="score-col">${val}</span>`;
                    }
                    return val;
                }
            })),
            pageLength: 20,
            scrollX: true,
            dom: 'lrtip'
        });
    }

    function toggleText(btn) {
        const $btn = $(btn);
        const $content = $btn.prev('.expandable');
        $content.toggleClass('expanded');
        $btn.text($content.hasClass('expanded') ? '[收合內容]' : '[展開全文]');
    }
</script>
